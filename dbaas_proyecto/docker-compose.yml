services:
  gateway:
    build: .
    container_name: dbaas_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dbaas_rabbitmq
    ports:
      - "5672:5672" # Puerto de datos para Pika
      - "15672:15672" # Panel de control web
    networks:
      - default

  mongo:
    image: mongo:latest
    container_name: mongodb_core
    ports:
      - "27017:27017"

version: "3.8"

services:
  # ------------------------------------
  # INFRAESTRUCTURA BASE
  # ------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: dbaas_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - dbaas_network

  mongo:
    image: mongo:latest
    container_name: mongodb_core
    ports:
      - "27017:27017"
    networks:
      - dbaas_network

  # ------------------------------------
  # MICROSERVICIOS (Usando guion medio '-')
  # ------------------------------------
  mv3-auth:
    build: ./MV3
    container_name: mv3-auth-container
    ports:
      - "50051:50051"
    depends_on:
      - mongo
    networks:
      - dbaas_network
    environment:
      - MONGO_URL=mongodb://mongo:27017

  mv1-database:
    build: ./MV1
    container_name: mv1-database-container
    ports:
      - "50052:50052"
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - dbaas_network
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - RABBITMQ_URL=amqp://rabbitmq:5672/

  mv2-query:
    build: ./MV2
    container_name: mv2-query-container
    ports:
      - "50053:50053"
    depends_on:
      - mongo
    networks:
      - dbaas_network
    environment:
      - MONGO_URL=mongodb://mongo:27017

  # ------------------------------------
  # API GATEWAY (Punto de entrada)
  # ------------------------------------
  gateway:
    build: ./dbaas_proyecto
    container_name: dbaas_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mv3-auth
      - mv1-database
      - mv2-query
      - rabbitmq
    networks:
      - dbaas_network
    environment:
      # ACTUALIZADO CON GUIONES MEDIOS PARA QUE gRPC FUNCIONE
      - AUTH_GRPC_HOST=mv3-auth:50051
      - DB_GRPC_HOST=mv1-database:50052
      - QUERY_GRPC_HOST=mv2-query:50053

networks:
  dbaas_network:
    driver: bridge
